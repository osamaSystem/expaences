name: expense_tracker_pro
description: A production-ready Flutter Expense Tracker application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  excel: ^4.0.6
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/expences_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/expences_icon.png
  adaptive_icon_background: '#0F172A'
  adaptive_icon_foreground: assets/branding/expences_icon.png
  remove_alpha_ios: true
